<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>❤️</title>

<!-- ✅ FIXED FONT LINKS -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: black;
}

body {
  font-family:'Montserrat',sans-serif;
}

section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ✅ LANDING */
.hero{position:relative;}
.hero img{width:100%;height:100%;object-fit:cover;}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
}

.hero-text{
  position:absolute;
  top:180px;
  left:100px;
  color:white;
  z-index:2;
}

.hero-text h1{font-size:70px;}

/* ✅ STORY */
.story-section{
  background:#f5f5f5;
  gap:70px;
}

.image-box img{
  width:450px; height:520px;
  border-radius:12px;
  object-fit:cover;
}

.text-box{
  max-width:650px;
  font-family:'Patrick Hand',cursive;
  font-size:22px;
  line-height:1.7;
}

/* ✅ SECTION 3 */
.question-section{
  background:black;
  color:white;
  gap:70px;
}

.question-text h2{
  font-family:'Playfair Display',serif;
  font-size:50px;
  text-align:center;
}

/* ✅ SECTION 4 */
.date-section{position:relative;}

.date-section img{
  position:absolute;
  width:100%;height:100%;
  object-fit:cover;
  z-index:0;
}

.date-section::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:1;
}

.content{
  position:relative;
  z-index:2;
  text-align:center;
  color:white;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  margin:10px;
  cursor:pointer;
}

.yes{background:#28a745;color:white;}
.no{background:#dc3545;color:white;}

/* ✅ CALENDAR */
.calendar-box{
  display:none;
  position:absolute;
  z-index:3;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  padding:40px;
  border-radius:16px;
  text-align:center;
  color:white;
  width:350px;
}

.calendar-box input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

/* ✅ CUISINE */
.cuisine-box{
  display:none;
  position:absolute;
  z-index:3;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:16px;
  width:80%;
  max-width:700px;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.card{
  background:rgba(255,255,255,0.25);
  padding:12px;
  border-radius:12px;
}

select{
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:6px;
}

/* ✅ FINAL */
.final-box{
  display:none;
  position:absolute;
  z-index:4;
  color:white;
  font-size:60px;
  text-align:center;
}

/* ✅ PLAY BUTTON */
.play-btn {
  margin-top: 20px;
  padding: 14px 28px;
  font-size: 18px;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.play-btn:hover {
  background: rgba(255, 255, 255, 0.25);
}
</style>
</head>

<body>

<!-- ✅ SINGLE AUDIO (FIXED) -->
<audio id="bgMusic" loop>
  <source src="yellow-music.mp3" type="audio/mpeg">
</audio>

<!-- ✅ PAGE 1 -->
<section class="hero">
  <img src="photo4.jpg">
  <div class="hero-text">
    <h1>HI THERE, YELL</h1>
    <button class="play-btn" onclick="playMusic()">Play Me ❤️</button>
  </div>
</section>

<!-- ✅ PAGE 2 -->
<section class="story-section">
<div class="image-box">
<img id="storyImage" src="photo5.jpg">
</div>

<div class="text-box">
<p id="storyText"></p>
</div>
</section>

<!-- ✅ PAGE 3 -->
<section class="question-section">
<div class="question-text">
<h2>I have something<br>to ask you…</h2>
</div>
<div class="image-box">
<img src="photo2.jpg">
</div>
</section>

<!-- ✅ PAGE 4 -->
<section class="date-section">

<img src="photo3.jpg">

<div class="content" id="questionBox">
<h1>Will you go on a date with me? ❤️</h1>
<button class="yes" onclick="openCalendar()">Yes</button>
<button class="no">No</button>
</div>

<div class="calendar-box" id="calendarBox">
<h3>Select a date</h3>
<input type="date" id="dateInput">
<button id="confirmBtn" disabled onclick="showCuisine()">Confirm</button>
</div>

<div class="cuisine-box" id="cuisineBox">
<h3>Choose your place 🍽️</h3>

<div class="grid">
<div class="card">Italian<select><option value="">Select restaurant</option><option>The Bayleaf</option><option>Giovanni’s</option><option>Aqua Pazza</option><option>Dolce Italia</option></select></div>
<div class="card">Japanese<select><option value="">Select restaurant</option><option>Kuuraku</option><option>Sushi Kai</option><option>Sake Colombo</option><option>Yumi</option></select></div>
<div class="card">Korean<select><option value="">Select restaurant</option><option>Kim’s Family</option><option>K-Town</option><option>Cho-Sun-Ok</option><option>Seoul BBQ</option></select></div>
<div class="card">Chinese<select><option value="">Select restaurant</option><option>Shang Palace</option><option>Min Han</option><option>88 Chinese</option><option>Dragon Cafe</option></select></div>
<div class="card">Indian<select><option value="">Select restaurant</option><option>Navratna</option><option>Sri Suryas</option><option>Chana’s</option><option>Shanmugas</option></select></div>
<div class="card">Sri Lankan<select><option value="">Select restaurant</option><option>Upali’s</option><option>Table by Nyne</option><option>Kolamba Kadè</option><option>Summer Colombo</option></select></div>
<div class="card" style="grid-column:span 2">Thai<select><option value="">Select restaurant</option><option>Thai Cuisine Boulevard</option><option>Royal Thai</option><option>Street Thai</option><option>Simply Thai</option></select></div>
</div>

<button onclick="finalStep()">Confirm ❤️</button>
</div>

<div class="final-box" id="finalBox">
It's a Date ❤️
</div>

</section>

<script>

// ✅ disable scroll restore
if ('scrollRestoration' in history) {
  history.scrollRestoration = 'manual';
}

// ✅ start from top
window.addEventListener("load", () => {
  window.scrollTo(0, 0);
});

// ✅ TYPEWRITER
const text = `We met last September... you are the one for me ❤️`;
let i=0;
function typeWriter(){
  if(i < text.length){
    document.getElementById("storyText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter,50);
  }
}

let started=false;
window.addEventListener("scroll",()=>{
  const section=document.querySelector(".story-section");
  if(section.getBoundingClientRect().top < window.innerHeight-100 && !started){
    started=true;
    typeWriter();
  }
});

// ✅ IMAGE
const images=["photo5.jpg","photo6.jpg","photo7.jpg","photo1.jpg"];
let current=0;
setInterval(()=>{
  current=(current+1)%images.length;
  document.getElementById("storyImage").src=images[current];
},4000);

// ✅ FLOW
function openCalendar(){
  document.getElementById("calendarBox").style.display="block";
}

document.getElementById("dateInput").addEventListener("change",()=>{
  document.getElementById("confirmBtn").disabled=false;
});

function showCuisine(){
  document.getElementById("calendarBox").style.display="none";
  document.getElementById("cuisineBox").style.display="block";
  document.getElementById("questionBox").style.display="none";
}

// ✅ FINAL STEP (FIXED EMOJIS)
function finalStep(){
  const date=document.getElementById("dateInput").value;

  const selects=document.querySelectorAll(".card select");
  let choices=[];
  selects.forEach(sel=>{
    if(sel.value!==""){choices.push(sel.value);}
  });

  let message="Hey \u2764\uFE0F\n";
  message+="I said YES!\n\n";
  message+="\uD83D\uDCC5 Date: "+date+"\n";
  message+="\uD83C\uDF7D\uFE0F Places: "+choices.join(", ")+"\n\n";
  message+="Can\'t wait \uD83D\uDC96";

  window.open("https://wa.me/94779662804?text="+encodeURIComponent(message));

  document.getElementById("cuisineBox").style.display="none";
  document.getElementById("finalBox").style.display="block";
}

// ✅ MUSIC
function playMusic(){
  document.getElementById("bgMusic").play();
  document.querySelector(".play-btn").style.display="none";
}

</script>

</body>
</html>
